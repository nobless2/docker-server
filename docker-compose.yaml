version: "3.8"

services:
  nginx:
    container_name: nginx-${PROJECT_NAME}
    image: "nginx:stable-alpine"
    ports:
      - "${SERVER_PORT}:80"
    volumes:
      - ./config/nginx/nginx${NGINX_CONFIG}.conf:/etc/nginx/conf.d/default.conf:ro
      - ./www:/var/www/html
    depends_on:
      - db
      - php
  php:
    container_name: php-${PROJECT_NAME}
    build:
      context: dockerfiles/php${PHP_VERSION}
    volumes:
      - ./config/php${PHP_VERSION}/php.ini:/usr/local/etc/php/php.ini
      - ~/.ssh:/root/.ssh:ro
      - ./www:/var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PHP_IDE_CONFIG: serverName=Docker
  db:
    container_name: mysql-${PROJECT_NAME}
    image: mariadb:11.1.2
    ports:
      - "${DB_PORT}:3306"
    environment:
      MYSQL_USER: "${DB_USER}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - ./db:/var/lib/mysql
      - ./config/db/my.cnf:/etc/mysql/conf.d/my.cnf

  # SERVICE CONTAINERS

  node:
    image: "node:alpine"
    working_dir: "/var/www/html"
    volumes:
      - ./www:/var/www/html
