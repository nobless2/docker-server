version: '3.8'

networks:
  mynetwork:
    name: network-${APP_NAME}
    driver: bridge

volumes:
  db-data: {}
  redis-data: {}

services:
  nginx:
    container_name: nginx-${APP_NAME}
    image: 'nginx:stable-alpine'
    ports:
      - '${APP_PORT}:80'
    volumes:
      - ./Docker/config/nginx/nginx${NGINX_CONFIG}.conf:/etc/nginx/conf.d/default.conf:ro
      - ./www:/var/www/html
    depends_on:
      - php
      - db
    networks:
      - mynetwork
  php:
    container_name: php-${APP_NAME}
    build:
      context: Docker/dockerfiles/php${PHP_VERSION}
    volumes:
      - ./Docker/config/php${PHP_VERSION}/php.ini:/usr/local/etc/php/php.ini
      - ~/.ssh:/root/.ssh:ro
      - ./www:/var/www/html
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command: ["webapp"]
    environment:
      PHP_IDE_CONFIG: serverName=Docker
    networks:
      - mynetwork
  db:
    container_name: mysql-${APP_NAME}
    image: mariadb:11.1.2
    ports:
      - "${DB_PORT}:3306"
    environment:
      MYSQL_USER: "${DB_USER}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - mynetwork
  redis:
    image: redis:7.0.8-alpine3.17
    container_name: redis-${APP_NAME}
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - mynetwork
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
  # SERVICE CONTAINERS

  node:
    image: 'node:alpine'
    working_dir: "/var/www/html"
    volumes:
      - ./www:/var/www/html
    networks:
      - mynetwork