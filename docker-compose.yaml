version: "3.8"

services:
  nginx:
    container_name: nginx
    image: "nginx:stable-alpine"
    ports:
      - "${SERVER_PORT}:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src:/var/www/html
    depends_on:
      - mysql
      - php
  php:
    container_name: php
    build:
      context: dockerfiles/php${PHP_VERSION}
    volumes:
      - ~/.ssh:/root/.ssh:ro
      - ./src:/var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PHP_IDE_CONFIG: serverName=Docker
  mysql:
    container_name: mysql
    image: mariadb:11.1.2
    ports:
      - "${DB_PORT}:3306"
    environment:
      MYSQL_USER: "${DB_USER}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - ./db:/var/lib/mysql


