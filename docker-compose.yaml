version: "3.8"

services:
  nginx:
    container_name: nginx
    image: "nginx:stable-alpine"
    ports:
      - "${SERVER_PORT}:80"
      - '${SERVER_SSL_PORT}:443'
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src:/var/www/html
    depends_on:
      - mysql
      - php
  php:
    container_name: php
    build:
      context: dockerfiles/php${PHP_VERSION}
    volumes:
      - ./src:/var/www/html
  mysql:
    container_name: mysql
    image: mariadb:11.1.2
    ports:
      - "${DB_PORT}:3306"
    environment:
      MYSQL_DATABASE: "${DB_NAME}"
      MYSQL_USER: "${DB_USER}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - ./db:/var/lib/mysql


